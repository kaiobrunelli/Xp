<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesembolsoOps</title>

  <!-- Tailwind CSS CDN (JIT, sem build) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tabler Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }

    /* Scrollbar suave */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Hover nas linhas da tabela via CSS + variável de cor */
    .contract-row { transition: background 0.12s, border-left-color 0.12s; }
    .contract-row:hover { background: #f8fafc !important; border-left-color: var(--row-accent, #94a3b8) !important; }

    /* Botões sidebar */
    .side-btn:hover { background: #f1f5f9 !important; }

    /* Animação de carregamento */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }

    /* Dialog overlay */
    .dialog-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(15,23,42,0.72);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    textarea { font-family: inherit; resize: none; outline: none; }
    button   { font-family: inherit; }
    h1,h2,h3,h4 { margin: 0; }
    p { margin: 0; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
