<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Macro de Desembolsos — Home (Modelo B)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
        colors: {
          brand: { 900:'#002A4D', 800:'#00437A', 700:'#005CA9', 500:'#2D8AD8', 300:'#6DBAFA', 200:'#A0D2FC', 100:'#CFE3F8', 50:'#E5F1FC' },
          amber: { 900:'#663A00', 700:'#A65E00', 600:'#D87B00', 500:'#F39200', 400:'#FDB548', 200:'#FFD392', 50:'#FFEFD6' },
          ink:   { 900:'#22292E', 700:'#404B52', 500:'#64747A', 300:'#9EB2BB', 200:'#D0E0E3', 100:'#EBF1F2', 50:'#F7FAFA' },
          ok:'#1A7A4A', err:'#C0392B', warn:'#D87B00',
        },
        boxShadow: {
          card: '0 1px 2px rgba(34,41,46,.04), 0 1px 3px rgba(34,41,46,.06)',
          pop:  '0 8px 24px rgba(0,67,122,.10), 0 2px 6px rgba(34,41,46,.06)',
        },
      }
    }
  }
</script>
<style>
  html, body { background: #E5F1FC; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #22292E; -webkit-font-smoothing: antialiased; }
  .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 280ms cubic-bezier(.22,.61,.36,1); }
  .acc-body.open { grid-template-rows: 1fr; }
  .acc-body > .acc-inner { overflow: hidden; }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
  .slide-in { animation: slideInRight 320ms cubic-bezier(.22,.61,.36,1) both; }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .skeleton { background: linear-gradient(90deg,#EBF1F2 0%,#F7FAFA 50%,#EBF1F2 100%); background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; }
  .row-hover:hover { background-color: #CFE3F8; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D0E0E3; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #9EB2BB; }
  ::-webkit-scrollbar-track { background: transparent; }
  *:focus-visible { outline: 2px solid #2D8AD8; outline-offset: 2px; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
